name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ruff
        run: ruff check app/config.py app/core app/llm app/ppp streamlit_app.py scripts/run_ppp_task.py tests

      - name: Mypy
        run: mypy app/config.py app/core app/llm app/ppp scripts/run_ppp_task.py tests

      - name: Bandit
        run: bandit -q -r app

      - name: Run tests
        run: pytest
