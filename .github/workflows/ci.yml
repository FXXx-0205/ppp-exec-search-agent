name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ruff
        run: ruff check app/config.py app/core app/llm app/ppp streamlit_app.py scripts/run_ppp_task.py tests

      - name: Mypy
        run: mypy app/config.py app/core app/llm app/ppp scripts/run_ppp_task.py tests

      - name: Bandit
        run: bandit -q -r app

      - name: Run tests
        run: pytest
